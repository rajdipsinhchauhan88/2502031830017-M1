<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <p>this is my first program</p>
    <h1><i>Heading 1</i></h1>
    <h2><strong>Heading 2</strong></h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>
    <p><em>Emphasized Text</em></p>
    <p><mark>Mark Text</mark></p>
    <p><small>Small Text</small></p>
    <p><del>Deleted Text</del></p>
    <p><ins>Inserted Text</ins></p>
    <p>Example <sub>Sub Text</sub></p>
    <p>H<sub>2</sub>O</p>
    <p style="color: red;">Example <sup>Super Text</sup></p>
    <p style="background-color: grey;">X<sup>2</sup></p>
    <p><b>Bold Text</b></p>
</body>
