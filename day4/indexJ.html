<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Example</title>
</head>
<body>

    <h2 id="demo"></h2>

    <button onclick="onlk()">Click Me</button>

    <h3 id="dt">Data Types</h3>

    <p id="vote"></p>

    <h3 id="evenodd"></h3>

     <h3 id="result"></h3>


    <h3 id="leap"></h3>
   <h3 id="drive"></h3>

     <h3 id="temp"></h3>


    <script>

        // Button Function
        function onlk() {  
            alert("Hello JS");
        }

        // Arithmetic Operations
        var x = 5;
        var y = 6;

        var add = x + y;
        var sb = x - y;
        var mul = x * y;

        document.getElementById("demo").innerHTML =
            "Addition is: " + add + "<br>" +
            "Subtraction is: " + sb + "<br>" +
            "Multiplication is: " + mul;

        // Data Types
        var a = true;
        var b = "hello";
        var c = [1, 2, 3];

        document.getElementById("dt").innerHTML =
            "Data type of y is: " + typeof(y) + "<br>" +
            "Data type of a is: " + typeof(a) + "<br>" +
            "Data type of b is: " + typeof(b) + "<br>" +
            "Data type of c is: " + typeof(c);

        // Voting Eligibility
        let age = 20;

        if (age >= 18) {
            document.getElementById("vote").innerHTML ="You are eligible for voting.";
        } else {
            document.getElementById("vote").innerHTML ="You are not eligible for voting.";
        }

        // Even or Odd Check
        let num = 7;

        if (num % 2 == 0) {
            document.getElementById("evenodd").innerHTML =num + " is Even Number";
        } else {
            document.getElementById("evenodd").innerHTML =num + " is Odd Number";
        }

           // Pass or Fail Check
        let marks = 35;

        if (marks >= 35) {
            document.getElementById("result").innerHTML ="You are Pass";
        } else {
            document.getElementById("result").innerHTML ="You are Fail";
        }
  // Leap Year Check
        let year = 2024;

        if (year % 4 == 0) {
            document.getElementById("leap").innerHTML =year + " is Leap Year";
        } else {
            document.getElementById("leap").innerHTML =year + " is Not Leap Year";
        }
    // Driving Eligibility Check
        let driverAge = 19;

        if (driverAge >= 18) {
            document.getElementById("drive").innerHTML ="You are eligible for driving.";
        } else {
            document.getElementById("drive").innerHTML ="You are not eligible for driving.";
        }

            // Temperature Check
        let temperature = 35;

        if (temperature > 30) {
            document.getElementById("temp").innerHTML ="Weather is Hot";
        } else {
            document.getElementById("temp").innerHTML ="Weather is Cold";
        }

    </script>

</body>
</html>
